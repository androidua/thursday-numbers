name: Powerball Auto-Update

on:
  schedule:
    # Friday at 4am AEST (UTC+10) = Thursday 18:00 UTC
    # Runs after Thursday evening Australian Powerball draws are published.
    # Note: during AEDT (daylight saving, Oct–Apr) this fires at 5am AEDT instead.
    - cron: '0 18 * * 4'
  workflow_dispatch:   # Allow manual trigger from the GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed so the bot can push the updated JSON files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape new draws
        run: python scripts/scrape.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/powerball_draws.json
          git diff --staged --quiet || git commit -m "auto: update draws and picks [skip ci]"
          git push
      # Deployment is handled automatically by Cloudflare Pages,
      # which watches the main branch and deploys on every push.
