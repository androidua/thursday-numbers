name: Powerball Auto-Update

on:
  schedule:
    # Friday at 4am AEST (UTC+10) = Thursday 18:00 UTC
    # Runs after Thursday evening Australian Powerball draws are published.
    # Note: during AEDT (daylight saving, Oct–Apr) this fires at 5am AEDT instead.
    - cron: '0 18 * * 4'
  workflow_dispatch:   # Allow manual trigger from the GitHub Actions UI

concurrency:
  group: powerball-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # Needed so the bot can push the updated JSON files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt

      - name: Scrape new draws
        run: |
          set -euo pipefail
          python scripts/scrape.py

      - name: Update sitemap lastmod
        run: |
          set -euo pipefail
          python -c "
          import re, datetime
          today = datetime.date.today().isoformat()
          path = 'web/sitemap.xml'
          with open(path) as f:
              content = f.read()
          content = re.sub(r'<lastmod>[^<]+</lastmod>', f'<lastmod>{today}</lastmod>', content)
          with open(path, 'w') as f:
              f.write(content)
          print(f'Updated sitemap lastmod to {today}')
          "

      - name: Commit updated data files
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/powerball_draws.json web/sitemap.xml
          if git diff --staged --quiet; then
            echo "No staged changes — nothing to commit."
          else
            git commit -m "auto: update draws and picks [skip actions]"
            git push
          fi
      # Deployment is handled automatically by Cloudflare Pages,
      # which watches the main branch and deploys on every push.
