name: Powerball Auto-Update

on:
  schedule:
    # Every Thursday at 10am UTC (8pm AEST / 9pm AEDT)
    # GitHub Actions doesn't support "every N weeks", so the script
    # itself checks whether 3+ weeks have passed since the last run.
    - cron: '0 10 * * 4'
  workflow_dispatch:   # Allow manual trigger from the GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed so the bot can push the updated JSON files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (scrape → generate → email)
        run: python scripts/run_all.py
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_RECIPIENT:  ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/powerball_draws.json picks/picks_history.json
          git diff --staged --quiet || git commit -m "auto: update draws and picks [skip ci]"
          git push
